<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modal Practice</title>
</head>
<body>
    <div class="modal-overlay hidden">
        <div class="modal">
            <div class="modal-header">
                <h2>This is a Title</h2>
                <button class="close-btn">X</button>
            </div>
            <div class="modal-body">
                <p>This is where I would put words if I had any to put.</p>
            </div>
            <div class="modal-footer">
                <button id="annoy">This is a button</button>
            </div>
        </div>
    </div>
    <div>
        <button id="open">Open Modal</button>
    </div>
</body>
</html>

<style>
    .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.5);
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .modal {
        background-color: white;
        padding: 20px;
        border-radius: 5px;
        width: 300px;
    }

    .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .close-btn {
        background: none;
        border: none;
        font-size: 20px;
        cursor: pointer;
    }

    .hidden {
        display: none;
    }
</style>
<script>
    const modalOverlay = document.querySelector('.modal-overlay');
    const closeBtn = document.querySelector('.close-btn');
    const openBtn = document.querySelector('#open');
    const annoyBtn = document.getElementById('annoy');

    annoyBtn.addEventListener('click', () => {
        alert('You clicked the button!');
    });

    // Function to open the modal
    function openModal() {
        modalOverlay.classList.remove('hidden');
    }

    // Event listener for the open button
    openBtn.addEventListener('click', openModal);


    // Function to close the modal
    function closeModal() {
        modalOverlay.classList.add('hidden');
    }

    modalOverlay.addEventListener('click', (e)=> {
        if (e.target === modalOverlay) {
            modalOverlay.classList.add('hidden');
        }
    })

    document.addEventListener('keydown', (event) => {
        if (event.key === 'Escape') {
            closeModal();
        }
    });

    // Event listener for the close button
    closeBtn.addEventListener('click', closeModal);

    // Example: Open the modal after 2 seconds
    setTimeout(openModal, 2000);
</script>
